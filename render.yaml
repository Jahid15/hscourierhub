services:
  - type: web
    name: hscourierhub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: EXTERNAL_API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.8
