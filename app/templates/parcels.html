{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
            📦 Global Tracking Ledger
        </h2>
        <a href="/parcel-entry" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors flex items-center gap-2">
            <span>+ Send New Order</span>
        </a>
    </div>

    <!-- UI Filter Controls -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6 flex flex-col md:flex-row gap-4 items-center">
        <div class="flex-1 w-full relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="searchInput" placeholder="Search by Order ID, Consignment, Customer, Phone..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:bg-white transition-all outline-none">
        </div>
        <div class="w-full md:w-64">
            <select id="courierFilter" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:bg-white transition-all outline-none font-medium appearance-none">
                <option value="all">🌐 All Couriers</option>
                <option value="pathao">🔴 Pathao</option>
                <option value="carrybee">🟡 Carrybee</option>
                <option value="steadfast">🟢 Steadfast</option>
            </select>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-100 text-gray-500 text-xs uppercase tracking-wider">
                        <th class="py-4 px-6 font-semibold rounded-tl-xl text-center">Status</th>
                        <th class="py-4 px-6 font-semibold">Tracking ID</th>
                        <th class="py-4 px-6 font-semibold">Courier / Merchant ID</th>
                        <th class="py-4 px-6 font-semibold">Customer Details</th>
                        <th class="py-4 px-6 font-semibold">Routing IDs</th>
                        <th class="py-4 px-6 font-semibold text-center">Logistics History</th>
                    </tr>
                </thead>
                <tbody id="parcelsTableBody" class="divide-y divide-gray-100 text-sm">
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                            Loading internal telemetry...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- History Modal -->
<div id="historyModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-fade-in-up">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <div>
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2" id="modalTitle">
                    Tracking Timeline #HS1001
                </h3>
            </div>
            <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-gray-600 transition-colors bg-white rounded-md p-1 border border-gray-200 hover:bg-gray-50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <!-- Interactive Body -->
        <div class="p-6 overflow-y-auto" id="modalTimelineBody" style="font-family: monospace; background: #fafafa;">
            <!-- Rendered by JS -->
        </div>

    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/parcels.js?v=1"></script>
{% endblock %}
