{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto p-4 mt-6">
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center justify-between">
            <span class="flex items-center"><span class="text-3xl mr-2">📦</span> Create Parcel</span>
            <button type="button" class="text-gray-400 hover:text-gray-700 transition" title="Clear Form" onclick="document.getElementById('parcelForm').reset()">
                <span>🔄</span>
            </button>
        </h1>
        
        <form id="parcelForm" class="space-y-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Configuration Profile</label>
                <select id="business_namespace" name="business_namespace" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50/50 cursor-pointer font-medium text-blue-900 border-blue-200">
                    <option value="">Loading dynamic profiles...</option>
                </select>
                <input type="hidden" id="courier" name="courier" value="">
                <input type="hidden" id="business" name="business" value="">
            </div>

            <hr class="border-gray-200">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name <span class="text-red-500">*</span></label>
                    <input type="text" id="recipient_name" name="recipient_name" required placeholder="Full Name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Phone <span class="text-red-500">*</span></label>
                    <input type="tel" id="recipient_phone" name="recipient_phone" required placeholder="01XXXXXXXXX"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <!-- Mini fraud check hook -->
                    <p id="miniFraudResult" class="text-xs mt-1 text-gray-500 hidden cursor-pointer hover:underline"></p>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-1">
                    <label class="block text-sm font-medium text-gray-700">Address <span class="text-red-500">*</span></label>
                    <button type="button" id="aiExtractBtn" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold text-xs px-3 py-1 rounded border border-indigo-200 transition-colors flex items-center shadow-sm">
                        <span>✨ Extract Details</span>
                        <div id="aiExtractLoader" class="hidden spinner ml-2" style="width: 12px; height: 12px; border-color: rgba(67, 56, 202, 0.3); border-top-color: #4338ca;"></div>
                    </button>
                </div>
                <textarea id="recipient_address" name="recipient_address" required rows="2" placeholder="Paste full string here (e.g., 'Jahid 1340tk 01676225090 uttara') and click Extract..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <!-- Dynamic Location section removed as requested by Admin -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Cash to Collect (COD) ৳ <span class="text-red-500">*</span></label>
                <input type="number" id="cod_amount" name="cod_amount" required min="0" placeholder="0"
                    class="w-full md:w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-gray-800">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold text-lg transition flex justify-center items-center shadow">
                <span>✨ Create Parcel</span>
                <div id="submitLoader" class="hidden spinner self ml-2"></div>
            </button>
        </form>

        <div id="resultArea" class="hidden mt-6">
            <div id="successBox" class="bg-green-50 border border-green-200 text-green-800 p-4 rounded-lg hidden">
                <div class="flex items-start">
                    <span class="text-2xl mr-3">✅</span>
                    <div>
                        <h3 class="font-bold text-lg mb-1">Parcel Created Successfully!</h3>
                        <p class="mb-1"><strong>Merchant ID:</strong> <span id="resMerchantId"></span></p>
                        <p class="mb-1"><strong>Consignment:</strong> <span id="resConsignment"></span></p>
                        <p id="resDeliveryFee" class="text-sm text-green-700 font-medium"></p>
                    </div>
                </div>
            </div>

            <div id="errorBox" class="bg-red-50 border border-red-200 text-red-800 p-4 rounded-lg hidden">
                <div class="flex items-start">
                    <span class="text-2xl mr-3">❌</span>
                    <div>
                        <h3 class="font-bold mb-1">Error Creating Parcel</h3>
                        <p id="errMsg" class="text-sm text-red-700"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.spinner {
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
<script src="/static/js/parcel_entry.js"></script>
{% endblock %}
